<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שעתוק לאחור וסינתזת cDNA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap");

    :root {
      --tile-size: clamp(24px, 2vw, 32px);
      --tile-gap: clamp(2px, 0.35vw, 4px);
      --row-height: calc(var(--tile-size) + 8px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Assistant", sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .shell {
      width: 100%;
      height: 100%;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .controls {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .controls h2 {
      margin: 0;
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 800;
      color: #818cf8;
      border-bottom: 1px solid rgba(67, 56, 202, 0.45);
      padding-bottom: 6px;
      line-height: 1.2;
    }

    #controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .stage-box {
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.7);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 64px;
      text-align: right;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stage-box:hover {
      border-color: rgba(129, 140, 248, 0.65);
      background: rgba(49, 65, 107, 0.72);
    }

    .stage-box .stage-id {
      font-size: 12px;
      color: rgba(129, 140, 248, 0.85);
      margin-bottom: 2px;
      line-height: 1.1;
    }

    .stage-box .stage-label {
      font-size: clamp(15px, 1.5vw, 18px);
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
    }

    .stage-active {
      border-color: #6366f1;
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.33);
      background: rgba(99, 102, 241, 0.18);
    }

    .main {
      flex: 1;
      min-height: 0;
      border: 1px solid rgba(71, 85, 105, 0.6);
      border-radius: 22px;
      padding: 12px;
      background: rgba(15, 23, 42, 0.8);
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    #stage-title {
      flex: 0 0 auto;
      text-align: right;
      font-size: clamp(22px, 2.3vw, 36px);
      font-weight: 800;
      color: #fff;
      border-right: 4px solid #6366f1;
      padding-right: 10px;
      line-height: 1.2;
      margin: 0;
    }

    .strands-container {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      direction: ltr;
      position: relative;
      padding-top: 14px;
      overflow: hidden;
    }

    .strand-row-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .strand-row {
      display: flex;
      align-items: center;
      gap: var(--tile-gap);
      min-height: var(--row-height);
    }

    .tiles-area {
      display: flex;
      gap: var(--tile-gap);
      align-items: center;
      justify-content: center;
    }

    .direction-tag {
      width: 28px;
      text-align: center;
      font-size: clamp(16px, 1.3vw, 20px);
      color: #fff;
      font-weight: 700;
      font-family: "Courier New", monospace;
      line-height: 1;
    }

    .strand-label-text {
      text-align: center;
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 3px;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .base-tile {
      width: var(--tile-size);
      height: var(--tile-size);
      border-radius: 4px;
      font-weight: 700;
      font-size: clamp(14px, 1.3vw, 20px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.4);
      transform: scale(0);
      opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    .base-tile.visible {
      transform: scale(1);
      opacity: 1;
    }

    .base-reading {
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.75);
      transform: scale(1.08);
      z-index: 3;
    }

    .base-A {
      background: #ef4444;
    }

    .base-C {
      background: #22c55e;
    }

    .base-G {
      background: #3b82f6;
    }

    .base-T,
    .base-U {
      background: #eab308;
    }

    .bond-row {
      display: flex;
      gap: var(--tile-gap);
      margin: 4px 0;
      justify-content: center;
      width: 100%;
    }

    .hydrogen-bond {
      width: var(--tile-size);
      height: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .hydrogen-bond::before {
      content: "";
      width: 2px;
      height: 100%;
      background: rgba(148, 163, 184, 0.55);
      border-radius: 1px;
    }

    .enzyme {
      width: clamp(62px, 6.2vw, 80px);
      height: clamp(62px, 6.2vw, 80px);
      border-radius: 999px;
      position: absolute;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(9px, 0.85vw, 11px);
      font-weight: 700;
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.35);
      background: radial-gradient(circle, #a855f7 32%, #6b21a8 100%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.55s linear, top 0.25s ease;
    }

    .enzyme-hidden {
      display: none;
    }

    .enzyme-active {
      animation: enzyme-pulse 1.2s infinite ease-in-out;
    }

    @keyframes enzyme-pulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow: 0 0 16px rgba(168, 85, 247, 0.45);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.04);
        box-shadow: 0 0 26px rgba(168, 85, 247, 0.75);
      }

      100% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow: 0 0 16px rgba(168, 85, 247, 0.45);
      }
    }

    .shattering {
      animation: shatter 0.8s forwards ease-in;
    }

    @keyframes shatter {
      100% {
        transform: translate(var(--x), var(--y)) rotate(var(--r));
        opacity: 0;
      }
    }

    #stage-description {
      flex: 0 0 auto;
      margin: 4px auto 0;
      max-width: min(100%, 980px);
      text-align: center;
      font-size: clamp(16px, 1.45vw, 22px);
      line-height: 1.35;
      color: #e2e8f0;
      border: 1px solid rgba(100, 116, 139, 0.45);
      background: rgba(30, 41, 59, 0.5);
      border-radius: 14px;
      padding: 10px 12px;
    }

    @media (max-width: 1180px) {
      #controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .main {
        border-radius: 18px;
      }
    }

    @media (max-width: 760px) {
      :root {
        --tile-size: clamp(18px, 4.1vw, 24px);
      }

      #controls {
        grid-template-columns: 1fr;
      }

      #stage-title {
        font-size: clamp(18px, 5vw, 24px);
      }

      #stage-description {
        font-size: clamp(13px, 3.2vw, 16px);
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="controls">
      <h2>שלבי התהליך:</h2>
      <div id="controls">
        <div onclick="setStage(1)" class="stage-box stage-active" id="btn-1">
          <span class="stage-id">שלב 1</span>
          <span class="stage-label">מולקולת mRNA</span>
        </div>
        <div onclick="setStage(2)" class="stage-box" id="btn-2">
          <span class="stage-id">שלב 2</span>
          <span class="stage-label">Reverse Transcriptase</span>
        </div>
        <div onclick="setStage(3)" class="stage-box" id="btn-3">
          <span class="stage-id">שלב 3</span>
          <span class="stage-label">RNase H (פירוק)</span>
        </div>
        <div onclick="setStage(4)" class="stage-box" id="btn-4">
          <span class="stage-id">שלב 4</span>
          <span class="stage-label">DNA Polymerase</span>
        </div>
      </div>
    </section>

    <section class="main">
      <h3 id="stage-title">שלב 1: תבנית mRNA</h3>
      <div class="strands-container" id="vis-container"></div>
      <div id="active-enzyme" class="enzyme enzyme-hidden"></div>
      <div id="stage-description">לאחר המיצוי, מתקבלת תערובת מולקולות mRNA בוגר.</div>
    </section>
  </div>

  <script>
    const sequences = {
      mrna: "AUGCCUGAGGAGAAG",
      cdna1: "TACGGACTCCTCTTC",
      cdna2: "ATGCCTGAGGAGAAG",
    };

    const pairMap = { A: "T", U: "A", T: "A", G: "C", C: "G" };
    let currentStage = 1;
    let animationInterval = null;

    function clearAnimation() {
      if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
      }
    }

    function createTile(base) {
      const tile = document.createElement("div");
      tile.className = `base-tile base-${base}`;
      tile.textContent = base;
      return tile;
    }

    function createStrandRow(startTag, endTag, label) {
      const wrap = document.createElement("div");
      wrap.className = "strand-row-wrap";
      wrap.innerHTML = `
        <div>
          <div class="strand-label-text">${label}</div>
          <div class="strand-row">
            <span class="direction-tag">${startTag}</span>
            <div class="tiles-area"></div>
            <span class="direction-tag">${endTag}</span>
          </div>
        </div>
      `;
      return wrap;
    }

    function renderStaticStrand(container, sequence, startTag, endTag, label) {
      const rowWrap = createStrandRow(startTag, endTag, label);
      const tilesArea = rowWrap.querySelector(".tiles-area");
      sequence.split("").forEach((base) => {
        const tile = createTile(base);
        tile.classList.add("visible");
        tilesArea.appendChild(tile);
      });
      container.appendChild(rowWrap);
      return rowWrap;
    }

    function setEnzymeVisible(visible) {
      const enzyme = document.getElementById("active-enzyme");
      if (visible) {
        enzyme.classList.remove("enzyme-hidden");
      } else {
        enzyme.classList.add("enzyme-hidden");
        enzyme.classList.remove("enzyme-active");
      }
      return enzyme;
    }

    function positionEnzyme(enzyme, container, topRow, index, stepWidth) {
      const containerRect = container.getBoundingClientRect();
      const topRowRect = topRow.getBoundingClientRect();
      const rowCenterY = topRowRect.bottom - containerRect.top + 32;
      const rowWidth = (sequences.mrna.length - 1) * stepWidth;
      const startX = -rowWidth / 2;
      enzyme.style.left = `calc(50% + ${startX + index * stepWidth}px)`;
      enzyme.style.top = `${rowCenterY}px`;
    }

    function runSynthesisAnimation(container, templateSeq, enzymeName, newLabel, isRTL) {
      const startTag = isRTL ? "5'" : "3'";
      const endTag = isRTL ? "3'" : "5'";
      const topRowWrap = renderStaticStrand(container, templateSeq, startTag, endTag, "תבנית");
      const topTiles = topRowWrap.querySelectorAll(".base-tile");

      const bondRow = document.createElement("div");
      bondRow.className = "bond-row";
      for (let i = 0; i < templateSeq.length; i += 1) {
        const bond = document.createElement("div");
        bond.className = "hydrogen-bond";
        bondRow.appendChild(bond);
      }
      container.appendChild(bondRow);

      const bottomStartTag = isRTL ? "3'" : "5'";
      const bottomEndTag = isRTL ? "5'" : "3'";
      const bottomRowWrap = createStrandRow(bottomStartTag, bottomEndTag, newLabel);
      const bottomTilesArea = bottomRowWrap.querySelector(".tiles-area");
      for (let i = 0; i < templateSeq.length; i += 1) {
        const placeholder = document.createElement("div");
        placeholder.style.width = "var(--tile-size)";
        placeholder.style.height = "var(--tile-size)";
        bottomTilesArea.appendChild(placeholder);
      }
      container.appendChild(bottomRowWrap);

      const enzyme = setEnzymeVisible(true);
      enzyme.innerHTML = enzymeName.replace(" ", "<br>");
      enzyme.classList.add("enzyme-active");
      enzyme.style.opacity = "1";

      const tileSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--tile-size")) || 30;
      const tileGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--tile-gap")) || 3;
      const stepWidth = tileSize + tileGap;

      let index = isRTL ? templateSeq.length - 1 : 0;
      const step = isRTL ? -1 : 1;
      let produced = 0;

      positionEnzyme(enzyme, container, topRowWrap, index, stepWidth);

      animationInterval = setInterval(() => {
        if (produced >= templateSeq.length) {
          clearAnimation();
          topTiles.forEach((tile) => tile.classList.remove("base-reading"));
          enzyme.classList.remove("enzyme-active");
          enzyme.style.opacity = "0.35";
          return;
        }

        topTiles.forEach((tile) => tile.classList.remove("base-reading"));
        if (topTiles[index]) topTiles[index].classList.add("base-reading");

        const base = templateSeq[index];
        const pairedBase = pairMap[base];

        const newTile = createTile(pairedBase);
        const target = bottomTilesArea.children[index];
        bottomTilesArea.replaceChild(newTile, target);
        requestAnimationFrame(() => {
          newTile.classList.add("visible");
          if (bondRow.children[index]) {
            bondRow.children[index].style.opacity = "1";
          }
        });

        produced += 1;
        index += step;
        if (produced < templateSeq.length) {
          positionEnzyme(enzyme, container, topRowWrap, index, stepWidth);
        }
      }, 700);
    }

    function renderDegradation(container) {
      renderStaticStrand(container, sequences.cdna1, "5'", "3'", "cDNA גדיל 1");
      const shattered = document.createElement("div");
      shattered.className = "strand-row-wrap";
      const row = document.createElement("div");
      row.className = "strand-row";
      row.style.gap = "var(--tile-gap)";
      sequences.mrna.split("").forEach((base) => {
        const tile = createTile(base);
        tile.classList.add("visible", "shattering");
        tile.style.setProperty("--x", `${(Math.random() - 0.5) * 280}px`);
        tile.style.setProperty("--y", `${(Math.random() - 1.2) * 140}px`);
        tile.style.setProperty("--r", `${Math.random() * 540}deg`);
        row.appendChild(tile);
      });
      shattered.appendChild(row);
      container.appendChild(shattered);
    }

    function setStage(stage) {
      currentStage = stage;
      clearAnimation();
      document.querySelectorAll(".stage-box").forEach((button) => button.classList.remove("stage-active"));
      document.getElementById(`btn-${stage}`).classList.add("stage-active");

      const container = document.getElementById("vis-container");
      const stageTitle = document.getElementById("stage-title");
      const stageDescription = document.getElementById("stage-description");

      container.innerHTML = "";
      setEnzymeVisible(false);

      switch (stage) {
        case 1:
          stageTitle.textContent = "שלב 1: תבנית mRNA";
          stageDescription.textContent = "לאחר המיצוי, מתקבלת תערובת מולקולות mRNA בוגר.";
          renderStaticStrand(container, sequences.mrna, "3'", "5'", "תבנית mRNA");
          break;
        case 2:
          stageTitle.textContent = "שלב 2: Reverse Transcriptase";
          stageDescription.textContent = "האנזים Reverse Transcriptase קורא את ה-mRNA ובונה גדיל cDNA משלים.";
          runSynthesisAnimation(container, sequences.mrna, "Reverse Transcriptase", "cDNA גדיל 1", false);
          break;
        case 3:
          stageTitle.textContent = "שלב 3: פירוק mRNA";
          stageDescription.textContent = "האנזים RNase H מזהה את ההיבריד RNA-DNA ומפרק את גדיל ה-RNA.";
          renderDegradation(container);
          break;
        case 4:
          stageTitle.textContent = "שלב 4: DNA Polymerase";
          stageDescription.textContent =
            "כעת גדיל ה-cDNA משמש כתבנית. האנזים DNA Polymerase בונה את הגדיל המשלים לקבלת מולקולות DNA דו גדילית.";
          runSynthesisAnimation(container, sequences.cdna1, "DNA Polymerase", "ds-cDNA", true);
          break;
        default:
          break;
      }
    }

    window.addEventListener("resize", () => {
      setStage(currentStage);
    });

    window.addEventListener("load", () => {
      setStage(1);
    });
  </script>
</body>
</html>
